<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Superbase Completo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Listado de Usuarios</h2>

        <!--FORMULARIO-->
        <div class="card p-3 mb-4">
            <input type="hidden" id="id">

            <input 
            type="text" 
            id="nombre"
            class="form-control mb-2" 
            placeholder="Nombre"
            >

            <input 
            type="email"
            id="correo" 
            class="form-control mb-3"
            placeholder="Correo"
            >

            <button 
            class="btn btn-primary"
            onclick="guardarUsuario()"
            >
            Guardar

            </button>

        </div>

        <!--TABLA-->
        <table class="table table-bordered table-stripe">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

    <script>

        console.log("JS cargando")

        //=============================
        //CONFIGURACION SUPABASE//
        //============================

        const supabaseUrl = "https://xafanubuivqwhjgwucmh.supabase.co";
        const supabaseKey = "sb_publishable_x5hsxL6c-zYivkfvqVpK5Q_uMBauKJM";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        //VALIDAR FORMULARIO

        function validar(nombre, correo) {
            if (!nombre || !correo) {
                alert("Todos los campos son obligatorios");
                return false;
            }

            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(correo)) {
                alert("Correo inválido");
                return false;
            }
            return true;
        }

        //LIMPIAR FORMULARIO

        function limpiarFormulario() {
            document.getElementById("id").value = "";
            document.getElementById("nombre").value = "";
            document.getElementById("correo").value = "";
        }

        // GUARDAR / ACTUALIZAR=========================

        async function guardarUsuario() {

            try {

                const id = document.getElementById("id").value;

                const nombre = document.getElementById("nombre").value.trim();

                const correo = document.getElementById("correo").value.trim();

                if (!validar(nombre, correo)) return;

                let error;

                // ===== UPDATE =====
                if (id) {

                    ({ error } = await supabaseClient
                        .from("usuarios")
                        .update({
                            nombre: nombre,
                            correo: correo
                        })
                        .eq("id", id));

                } else {

                    // ===== INSERT =====
                    ({ error } = await supabaseClient
                        .from("usuarios")
                        .insert([
                            {
                                nombre: nombre,
                                correo: correo
                            }
                        ]));
                }

                if (error) {
                    throw error;
                }

                alert("Operación exitosa");

                limpiarFormulario();

                cargarUsuarios();

            } catch (err) {

                console.error(err);

                alert("Error: " + err.message);
            }
        }

        // =========================
        // CARGAR USUARIOS
        // =========================

        async function cargarUsuarios() {

            try {

                const { data, error } = await supabaseClient
                    .from("usuarios")
                    .select("*")
                    .order("id", { ascending: true });

                if (error) {
                    throw error;
                }

                const tabla = document.getElementById("tabla");

                let html = "";

                data.forEach(usuario => {

                    html += `
          <tr>

            <td>${usuario.id}</td>

            <td>${usuario.nombre}</td>

            <td>${usuario.correo}</td>

            <td>

              <button
                class="btn btn-warning btn-sm me-1"
                onclick="editarUsuario(
                  ${usuario.id},
                  \`${usuario.nombre}\`,
                  \`${usuario.correo}\`
                )"
              >
                Editar
              </button>

              <button
                class="btn btn-danger btn-sm"
                onclick="eliminarUsuario(${usuario.id})"
              >
                Eliminar
              </button>

            </td>

          </tr>
        `;
                });

                tabla.innerHTML = html;

            } catch (err) {

                console.error(err);

                alert("Error al cargar usuarios: " + err.message);
            }
        }

        cargarUsuarios();

        //=======================
        //EDITAR
        //======================

        function editarUsuario(id,nombre, correo){
            document.getElementById("id").value = id;
            document.getElementById("nombre").value = nombre;
            document.getElementById("correo").value = correo;
        }

        //=======================
        //ELIMINAR
        //======================

        async function eliminarUsuario(id){
            const confirmar = confirm ("¿Deseas eliminar este usuario?");
            if (!confirmar) return;
            try{
                const {error} = await supabaseClient
                .from("usuarios")
                .delete()
                .eq ("id", id);

                if (error){
                    throw error;
                }

                alert ("Usuario eliminado");
                cargarUsuarios();
            }catch (err){
                console.error(err);
                alert ("Error al eliminar: " + err.message);
            }
        }

        //=======================
        //CARGA INICIAL
        //======================

        cargarUsuarios();






    </script>

</body>

</html>
